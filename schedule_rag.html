<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule RAG - AI Course Schedule Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --bg-light: #1e293b;
            --bg-lighter: #334155;
            --text: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #475569;
            --success: #10b981;
            --error: #ef4444;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
            height: 100vh;
            max-width: 100%;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 1.5rem 2rem;
            border-bottom: 2px solid var(--primary-dark);
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        /* MAIN CONTENT */
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr auto;
            gap: 0;
            overflow: hidden;
        }

        /* CHAT AREA */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--bg);
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: var(--bg-light);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.assistant .message-content {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 12px 4px 12px 12px;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            flex-shrink: 0;
            margin-top: 0.25rem;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .message.user .message-avatar {
            background: var(--bg-lighter);
        }

        .message.loading .message-content {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            padding: 1.2rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 1rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        /* INPUT AREA */
        .input-area {
            padding: 1.5rem 2rem;
            background: var(--bg-light);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            flex: 1;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-send {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            min-width: 100px;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-send:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-upload {
            background: var(--bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 0.5rem 1rem;
        }

        .btn-upload:hover {
            background: var(--primary);
            color: white;
        }

        .btn-clear {
            background: var(--bg);
            color: var(--text-secondary);
            border: 2px solid var(--border);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .btn-clear:hover {
            background: var(--error);
            border-color: var(--error);
            color: white;
        }

        /* FILE UPLOAD */
        .file-input {
            display: none;
        }

        .file-status {
            font-size: 0.85rem;
            padding: 0.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            color: var(--text-secondary);
        }

        .file-status.loaded {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            max-height: calc(100vh - 80px);
        }

        .sidebar-section {
            margin-bottom: 2rem;
        }

        .sidebar-section h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .sidebar-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--bg);
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .sidebar-item:hover {
            background: var(--bg-lighter);
            border-color: var(--primary);
        }

        .sidebar-item.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            font-size: 0.85rem;
        }

        .stat {
            padding: 0.75rem;
            background: var(--bg);
            border-radius: 6px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .stat-label {
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .message-content {
                max-width: 90%;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .input-area {
                flex-direction: column;
                padding: 1rem;
            }

            .input-group {
                flex-direction: column;
            }

            input[type="text"] {
                width: 100%;
            }

            button {
                width: 100%;
            }

            .chat-messages {
                padding: 1rem;
            }
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-light);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow);
        }

        .modal-content h2 {
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .modal-content p {
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .modal-actions button {
            flex: 1;
        }

        .btn-secondary {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        /* TOAST NOTIFICATIONS */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-light);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            z-index: 999;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.success {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>📚 Schedule RAG</h1>
            <p>Ask your course schedule questions in natural language</p>
        </header>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- CHAT -->
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <h2>Welcome to Schedule RAG</h2>
                        <p>Upload your schedule CSV and ask questions about your courses</p>
                    </div>
                </div>

                <!-- INPUT -->
                <div class="input-area">
                    <div class="input-group">
                        <button class="btn-upload" id="uploadBtn" title="Upload Schedule CSV">
                            📤 Upload CSV
                        </button>
                        <input 
                            type="text" 
                            id="messageInput" 
                            placeholder="Ask about your schedule... e.g., 'When is my AI class?'"
                            disabled
                        >
                        <button class="btn-send" id="sendBtn" disabled>
                            Send
                        </button>
                    </div>
                    <button class="btn-clear" id="clearBtn">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FILE INPUT -->
    <input type="file" id="fileInput" class="file-input" accept=".csv">

    <!-- LOADING MODAL -->
    <div class="modal" id="loadingModal">
        <div class="modal-content">
            <h2>Loading Schedule...</h2>
            <p>Processing your CSV file and creating embeddings. This may take a moment.</p>
            <div style="display: flex; gap: 0.4rem; justify-content: center; margin: 2rem 0;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const API_URL = 'http://localhost:8000';
        const MESSAGES_CONTAINER = document.getElementById('chatMessages');
        const MESSAGE_INPUT = document.getElementById('messageInput');
        const SEND_BTN = document.getElementById('sendBtn');
        const UPLOAD_BTN = document.getElementById('uploadBtn');
        const FILE_INPUT = document.getElementById('fileInput');
        const CLEAR_BTN = document.getElementById('clearBtn');
        const LOADING_MODAL = document.getElementById('loadingModal');

        // STATE
        let isLoading = false;
        let csvLoaded = false;

        // ============================================================
        // EVENT LISTENERS
        // ============================================================

        SEND_BTN.addEventListener('click', sendMessage);
        MESSAGE_INPUT.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading) sendMessage();
        });
        UPLOAD_BTN.addEventListener('click', () => FILE_INPUT.click());
        FILE_INPUT.addEventListener('change', handleFileUpload);
        CLEAR_BTN.addEventListener('click', clearChat);

        // ============================================================
        // MAIN FUNCTIONS
        // ============================================================

        async function sendMessage() {
            const message = MESSAGE_INPUT.value.trim();
            if (!message || isLoading || !csvLoaded) return;

            // Add user message
            addMessage(message, 'user');
            MESSAGE_INPUT.value = '';
            SEND_BTN.disabled = true;
            MESSAGE_INPUT.disabled = true;
            isLoading = true;

            // Show loading
            addLoadingMessage();

            try {
                const response = await fetch(`${API_URL}/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                
                // Remove loading message
                removeLoadingMessage();
                
                // Add assistant response
                addMessage(data.response, 'assistant');
            } catch (error) {
                removeLoadingMessage();
                showToast(`Error: ${error.message}`, 'error');
                addMessage('Sorry, I encountered an error. Please try again.', 'assistant');
            } finally {
                isLoading = false;
                SEND_BTN.disabled = false;
                MESSAGE_INPUT.disabled = false;
                MESSAGE_INPUT.focus();
            }
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.name.endsWith('.csv')) {
                showToast('Please upload a CSV file', 'error');
                return;
            }

            LOADING_MODAL.classList.add('active');
            UPLOAD_BTN.disabled = true;

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch(`${API_URL}/ingest`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                csvLoaded = true;
                MESSAGE_INPUT.disabled = false;
                SEND_BTN.disabled = false;
                
                showToast(`✅ Loaded ${file.name}`, 'success');
                clearChat();
                addMessage(`📚 I've loaded your schedule from ${file.name}. Ask me anything about your courses!`, 'assistant');
                
                UPLOAD_BTN.textContent = `✓ ${file.name}`;
                UPLOAD_BTN.style.background = 'rgba(16, 185, 129, 0.2)';
                UPLOAD_BTN.style.color = 'var(--success)';
            } catch (error) {
                showToast(`Error loading file: ${error.message}`, 'error');
            } finally {
                LOADING_MODAL.classList.remove('active');
                UPLOAD_BTN.disabled = false;
            }
        }

        function addMessage(text, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            if (role === 'user') {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatarDiv);
            } else {
                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(contentDiv);
            }

            MESSAGES_CONTAINER.appendChild(messageDiv);
            
            // Remove empty state
            const emptyState = MESSAGES_CONTAINER.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Scroll to bottom
            MESSAGES_CONTAINER.scrollTop = MESSAGES_CONTAINER.scrollHeight;
        }

        function addLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant loading';
            messageDiv.id = 'loadingMessage';

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.textContent = '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);
            MESSAGES_CONTAINER.appendChild(messageDiv);

            MESSAGES_CONTAINER.scrollTop = MESSAGES_CONTAINER.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMsg = document.getElementById('loadingMessage');
            if (loadingMsg) loadingMsg.remove();
        }

        function clearChat() {
            MESSAGES_CONTAINER.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📅</div>
                    <h2>Chat Cleared</h2>
                    <p>Ask a new question about your schedule</p>
                </div>
            `;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 4000);
        }

        // ============================================================
        // INIT
        // ============================================================

        window.addEventListener('load', () => {
            // Check if CSV already loaded
            fetch(`${API_URL}/status`)
                .then(r => r.json())
                .then(data => {
                    if (data.vectorstore_exists) {
                        csvLoaded = true;
                        MESSAGE_INPUT.disabled = false;
                        SEND_BTN.disabled = false;
                        UPLOAD_BTN.textContent = '✓ CSV Loaded';
                        UPLOAD_BTN.style.background = 'rgba(16, 185, 129, 0.2)';
                        UPLOAD_BTN.style.color = 'var(--success)';
                        showToast('✅ Schedule loaded!', 'success');
                        addMessage('📚 Your schedule is already loaded. What would you like to know?', 'assistant');
                    }
                })
                .catch(() => {
                    // Backend might not have status endpoint, that's ok
                });
        });

        // Focus on input when page loads
        window.addEventListener('load', () => {
            MESSAGE_INPUT.focus();
        });
    </script>
</body>
</html>
